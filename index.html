<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>musicvan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* --- Retro colour palette --- */
    :root {
      --mv-orange: #e86f2a;
      --mv-cream: #f7f3e9;
      --mv-charcoal: #2b2b2b;
      --mv-grain: rgba(0,0,0,0.04);
    }

    /* --- Global reset --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

  body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--mv-cream);
  font-family: "Helvetica Neue", Arial, sans-serif;
  color: var(--mv-charcoal);
  position: relative;
  overflow: hidden;
}

.frame {
  border: 10px solid var(--mv-orange);
  padding: 8vh 10vw;
  text-align: center;
  background: white;
  box-shadow: 0 0 80px rgba(0,0,0,0.1);
  width: 90vw;
  height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.logo {
  max-width: 500px;
  width: 45vw;
  margin-bottom: 40px;
  opacity: 0.95;
}

.tagline {
  font-size: 1.3rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--mv-orange);
  margin-top: 20px;
}

.footer {
  position: absolute;
  bottom: 20px;
  font-size: 0.8rem;
  opacity: 0.6;
  letter-spacing: 0.05em;
}

}
  </style>
</head>

<body>
  <div class="frame">
    <img src="assets/musicvan-logo.png" alt="musicvan Logo" class="logo">
    <div class="tagline">Vinyl Care • Retro Spirit • Modern Craft</div>
  </div>

  <div class="footer">musicvanshop.co.uk</div>
</body>
</html>
