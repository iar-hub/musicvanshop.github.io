<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>musicvan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* --- Retro colour palette --- */
    :root {
      --mv-orange: #e86f2a;
      --mv-cream: #f7f3e9;
      --mv-charcoal: #2b2b2b;
      --mv-grain: rgba(0,0,0,0.04);
    }

    /* --- Global reset --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--mv-cream);
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: var(--mv-charcoal);
      position: relative;
      overflow: hidden;
    }

    /* --- Subtle film grain overlay --- */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--mv-grain);
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    /* --- Retro frame --- */
    .frame {
      border: 8px solid var(--mv-orange);
      padding: 6vw 8vw;
      text-align: center;
      background: white;
      box-shadow: 0 0 60px rgba(0,0,0,0.08);
      position: relative;
      max-width: 900px;
      width: 80%;
    }

    /* --- Logo --- */
    .logo {
      max-width: 400px;
      width: 40vw;
      margin-bottom: 40px;
      opacity: 0.95;
    }

    /* --- Retro tagline --- */
    .tagline {
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mv-orange);
      margin-top: 10px;
    }

    /* --- Footer strip --- */
    .footer {
      position: absolute;
      bottom: 30px;
      font-size: 0.75rem;
      opacity: 0.6;
      letter-spacing: 0.05em;
    }
  </style>
</head>

<body>
  <div class="frame">
    <img src="assets/musicvan-logo.png" alt="musicvan Logo" class="logo">
    <div class="tagline">Vinyl Care • Retro Spirit • Modern Craft</div>
  </div>

  <div class="footer">musicvan — Placeholder Site</div>
</body>
</html>
